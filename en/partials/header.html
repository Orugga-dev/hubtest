<header
  id="siteHeaderBar"
  class="fixed top-0 inset-x-0 z-50 backdrop-blur-md bg-backgroundDark/70 border-b border-white/5 transition-all duration-300"
>
  <div
    id="headerInner"
    class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between transition-all duration-300"
  >
    <!-- LOGO -->
    <a aria-label="AdIA Home" class="flex items-center" href="index.html">
      <img
        src="assets/adia-logo-dark.png"
        alt="AdIA"
        class="h-6 md:h-7 w-auto transition-all duration-300"
        data-header-logo
        loading="eager"
        decoding="async"
      />
    </a>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-8 text-sm">
      <a
        class="hover:text-white pb-1 border-b-2 border-transparent"
        data-nav="1"
        href="index.html"
        >Why AdIA</a
      >
      <a
        class="hover:text-white pb-1 border-b-2 border-transparent"
        data-nav="1"
        href="how-it-works.html"
        >How it works</a
      >
      <a
        class="hover:text-white pb-1 border-b-2 border-transparent"
        data-nav="1"
        href="who-we-are.html"
        >Who we are</a
      >
      <a
        class="hover:text-white pb-1 border-b-2 border-transparent"
        data-nav="1"
        href="showcase.html"
        >Cases</a
      >
    </nav>

    <!-- Right side -->
    <div class="flex items-center gap-4">
      <!-- Language switch -->
      <div
        class="flex items-center gap-2 text-xs font-semibold"
        id="langSwitcher"
        aria-label="Language selector"
      >
        <button type="button" data-lang="en" class="hover:opacity-100">
          EN
        </button>
        <span class="opacity-40">|</span>
        <button type="button" data-lang="es" class="hover:opacity-100">
          ES
        </button>
      </div>

      <!-- CTA -->
      <a
        class="bg-primary px-5 py-2 rounded-lg text-sm hover:bg-primary/90 transition text-backgroundDark font-bold"
        href="request-demo.html"
      >
        Let’s talk
      </a>

      <!-- Mobile menu button -->
      <button
        aria-expanded="false"
        aria-label="Open menu"
        class="md:hidden inline-flex items-center justify-center rounded-lg border border-white/10 bg-white/5 p-2 text-slate-200 hover:bg-white/10 transition"
        id="mobileMenuBtn"
      >
        <span class="material-symbols-outlined text-[22px]">menu</span>
      </button>
    </div>
  </div>

  <!-- Mobile nav -->
  <div
    class="md:hidden hidden border-t border-white/5 bg-backgroundDark/92 backdrop-blur-md fixed inset-x-0 z-40"
    id="mobileMenu"
    style="top: 72px;"
  >
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col gap-4 text-sm">
      <a
        class="hover:text-white pb-1 border-b-2 border-transparent"
        data-nav="1"
        href="index.html"
        >Why AdIA</a
      >
      <a
        class="hover:text-white pb-1 border-b-2 border-transparent"
        data-nav="1"
        href="how-it-works.html"
        >How it works</a
      >
      <a
        class="hover:text-white pb-1 border-b-2 border-transparent"
        data-nav="1"
        href="who-we-are.html"
        >Who we are</a
      >
      <a
        class="hover:text-white pb-1 border-b-2 border-transparent"
        data-nav="1"
        href="showcase.html"
        >Cases</a
      >
      <a
        class="mt-2 inline-flex items-center justify-center rounded-lg bg-primary px-5 py-2 hover:bg-primary/90 transition text-backgroundDark font-bold"
        href="request-demo.html"
        >Let’s talk</a
      >
    </div>
  </div>
</header>
