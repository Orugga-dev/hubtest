<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,follow" />
  <title>AdIA</title>

  <script>
    (function () {
      var langs = [];
      if (Array.isArray(navigator.languages)) langs = navigator.languages;
      if (!langs.length && navigator.language) langs = [navigator.language];
      langs = (langs || []).map(function (l) { return String(l || "").toLowerCase(); });

      var isSpanish = langs.some(function (l) { return l === "es" || l.startsWith("es-"); });
      var target = isSpanish ? "es/" : "en/";

      var qs = window.location.search || "";
      var hash = window.location.hash || "";

      var path = (window.location.pathname || "").toLowerCase();
      if (path.endsWith("/es/") || path.endsWith("/en/") || path.endsWith("/es/index.html") || path.endsWith("/en/index.html")) {
        return;
      }

      window.location.replace(target + qs + hash);
    })();
  </script>

  <noscript>
    <meta http-equiv="refresh" content="0;url=en/">
  </noscript>
</head>
<body style="font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 24px;">
  <p>Redirecting…</p>
  <p>
    If you’re not redirected: <a href="en/">English</a> · <a href="es/">Español</a>
  </p>
</body>
</html>
