<!-- Cinematic hero reel (video background) -->
<style>
    html, body { overflow-x: hidden; }

    .hero-reel-wrap{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      background-image:url('hero-reel-poster.jpg'); /* fallback */
      background-size:cover;
      background-position:center;
    }
    .hero-reel-video{
      position:absolute;
      top:50%;
      left:50%;
      width:116%;
      height:116%;
      object-fit:cover;
      object-position:center;
      transform:translate(-50%, -50%) scale(1.02);
      filter:blur(14px) contrast(1.18) saturate(1.15) brightness(1.05);
    }
    .hero-reel-overlay{
      position:absolute;
      inset:0;
      background:radial-gradient(70% 60% at 50% 45%,
        rgba(11,20,26,0.08) 0%,
        rgba(11,20,26,0.50) 55%,
        rgba(11,20,26,0.78) 100%);
    }
    .hero-reel-grain{
      position:absolute;
      inset:0;
      background-image:url('grain.png');
      opacity:.55;
      mix-blend-mode:overlay;
    }
    @media (max-width: 768px){
      .hero-reel-video{
        width:128%;
        height:128%;
        filter:blur(10px) contrast(1.15) saturate(1.10) brightness(1.02);
      }
      .hero-reel-grain{opacity:.45;}
    }

    .hero-focus{position:relative;}
    .hero-focus::before{
      content:"";
      position:absolute;
      inset:-28px;
      background:radial-gradient(65% 60% at 50% 38%,
        rgba(11,20,26,.55) 0%,
        rgba(11,20,26,.28) 45%,
        rgba(11,20,26,0) 78%);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      border-radius:28px;
      z-index:-1;
      pointer-events:none;
    }
    .hero-focus h1, .hero-focus p{ text-shadow:0 2px 18px rgba(0,0,0,.25); }
